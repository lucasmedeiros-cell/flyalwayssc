# Blueprint de Render para el backend Vialta API + su base de datos Postgres.
# Cómo usarlo: en https://dashboard.render.com → "New +" → "Blueprint" →
# seleccionar este repo. Render lee este archivo, crea la BD y el servicio,
# y despliega. Detalle completo en apps/api/DEPLOY.md.

databases:
  - name: flyalways-db
    databaseName: flyalways
    user: flyalways
    plan: free          # Nota: el Postgres free de Render expira ~30 días. Ver DEPLOY.md.

services:
  - type: web
    name: flyalways-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .            # raíz del monorepo (el Dockerfile lo requiere)
    plan: free                  # el web free hiberna tras inactividad (cold start)
    healthCheckPath: /api/health
    autoDeploy: true            # redeploy en cada push a la rama conectada
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flyalways-db
          property: connectionString
      - key: PORT
        value: "4000"
      # CORS: dominios de la web y el CRM en Netlify (separados por coma).
      - key: WEB_ORIGIN
        value: "https://flyalwayssc.netlify.app,https://flyalwayssc-crm.netlify.app"
      # Secretos JWT: Render los genera automáticamente (no quedan en el repo).
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: "8h"
      - key: JWT_REFRESH_TTL
        value: "30d"
